name: release

# Cut a release by pushing a version tag (e.g. `v0.1.0`). Can also be run
# from the Actions tab (workflow_dispatch) for a dry-run rebuild.
#
# Pipeline: verify (full CI) -> cross-platform standalone binaries (Bun) ->
# GitHub Release with SHA256SUMS + auto-generated notes -> npm publish
# (tag pushes only, when an NPM_TOKEN secret is configured).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to release against (e.g. v0.1.0)'
        required: true

permissions:
  contents: write # create the Release + upload assets
  id-token: write # npm publish --provenance

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # Gate: never ship anything unless the full suite is green.
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run ci # typecheck -> lint -> test -> build

  # One artifact per OS/arch. Bun cross-compiles every target from a single
  # Linux host, so the whole matrix runs without macOS/Windows runners.
  binaries:
    name: build ${{ matrix.name }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: bun-darwin-arm64, name: pentesterflow-darwin-arm64 }
          - { target: bun-darwin-x64, name: pentesterflow-darwin-x64 }
          - { target: bun-linux-x64, name: pentesterflow-linux-x64 }
          - { target: bun-linux-arm64, name: pentesterflow-linux-arm64 }
          - { target: bun-windows-x64, name: pentesterflow-windows-x64.exe }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Stamp version into the binary
        run: |
          VER="${RELEASE_TAG#v}"
          # The Bun-compiled binary doesn't run tsup's --define, so it reads
          # the FALLBACK in version.ts. Patch it to the release version so
          # `pentesterflow --version` reports correctly. No-op if unmatched.
          sed -i "s/const FALLBACK = 'dev';/const FALLBACK = '${VER}';/" src/version/version.ts
      - name: Compile standalone binary
        run: |
          mkdir -p dist-bin
          bun build src/cli/index.ts \
            --compile \
            --minify \
            --target ${{ matrix.target }} \
            --outfile dist-bin/${{ matrix.name }}
      - name: Checksum
        run: cd dist-bin && sha256sum "${{ matrix.name }}" > "${{ matrix.name }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist-bin/*
          if-no-files-found: error

  # Collect every binary + a combined SHA256SUMS into one GitHub Release.
  release:
    name: github release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-bin
          merge-multiple: true
      - name: Aggregate checksums
        run: |
          cd dist-bin
          cat ./*.sha256 > SHA256SUMS
          rm -f ./*.sha256
          echo "Release assets:" && ls -la
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-bin/*

  # npm publish runs only for real tag pushes (not manual dry-runs) and only
  # when an NPM_TOKEN secret exists, so the GitHub Release never fails just
  # because publishing isn't configured yet.
  npm:
    name: publish npm
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Stamp version from tag
        run: npm pkg set version="${RELEASE_TAG#v}"
      - run: npm run build
      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish skipped
        if: env.NPM_TOKEN == ''
        run: echo "NPM_TOKEN secret not set — skipping npm publish. The GitHub Release was still created."
